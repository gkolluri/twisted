<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Twisted Bar & Grill | Links</title>
  <meta name="description" content="Quick links to Twisted Bar & Grill menus, social media, and Google reviews in The Colony, TX.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#111114">
  <link rel="canonical" href="{{SITE_URL}}/links">
  <link rel="icon" href="/images/logo-mark.png" type="image/png">
  <link rel="apple-touch-icon" href="/images/logo-mark.png">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Twisted Bar & Grill">
  <meta property="og:url" content="{{SITE_URL}}/links">
  <meta property="og:title" content="Twisted Bar & Grill | Links">
  <meta property="og:description" content="Menus, social media, and reviews for Twisted Bar & Grill in The Colony, TX.">
  <meta property="og:image" content="{{SITE_URL}}/images/hero-patio.png">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Twisted Bar & Grill | Links">
  <meta name="twitter:description" content="Menus, social media, and reviews for Twisted Bar & Grill in The Colony, TX.">
  <meta name="twitter:image" content="{{SITE_URL}}/images/hero-patio.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="links-page">

  <main class="links-page-main">
    <div class="links-page-inner">
      <a href="/" class="links-page-logo" aria-label="Twisted Bar & Grill home">
        <img src="/images/logo-header.png" alt="Twisted Bar & Grill" width="220" height="60">
      </a>
      <p class="links-page-tagline">{{CMS_LINKS_TAGLINE}}</p>

      <nav class="links-stack" aria-label="Quick links">
{{CMS_LINKS_STACK}}
      </nav>

      <p class="links-page-footer">
        Visit our website: <a href="{{CMS_LINKS_FOOTER_WEBSITE_URL}}">{{CMS_LINKS_FOOTER_WEBSITE_DISPLAY}}</a> or call: <a href="tel:{{CMS_PHONE_TEL}}">{{CMS_PHONE}}</a>
      </p>
    </div>
  </main>

  <script src="/js/links-analytics.js" defer></script>
</body>
</html>
