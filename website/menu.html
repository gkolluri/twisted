<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | Twisted Bar & Grill | Wings, Tacos & Burgers in The Colony, TX</title>
  <meta name="description" content="Menu at Twisted Bar & Grill in The Colony, TX — Twisted Potato, house special wings, steak tacos, Angus burgers, fish and chips, loaded nachos, hookah, and full bar near Grandscape.">
  <meta name="robots" content="index, follow, max-image-preview:large">
  <meta name="theme-color" content="#111114">
  <link rel="canonical" href="{{SITE_URL}}/menu">
  <link rel="sitemap" type="application/xml" href="/sitemap.xml">
  <link rel="icon" href="/images/logo-mark.png" type="image/png">
  <link rel="apple-touch-icon" href="/images/logo-mark.png">

  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Twisted Bar & Grill">
  <meta property="og:url" content="{{SITE_URL}}/menu">
  <meta property="og:title" content="Menu | Twisted Bar & Grill | The Colony, TX">
  <meta property="og:description" content="Appetizers, wings, tacos, burgers, and bar favorites at Twisted Bar & Grill near Grandscape.">
  <meta property="og:image" content="{{SITE_URL}}/images/hero-patio.png">
  <meta property="og:image:secure_url" content="{{SITE_URL}}/images/hero-patio.png">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="767">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:alt" content="Twisted Bar and Grill patio at sunset in The Colony, TX">
  <meta property="og:locale" content="en_US">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Menu | Twisted Bar & Grill">
  <meta name="twitter:description" content="Wings, tacos, burgers, and bar favorites in The Colony, TX.">
  <meta name="twitter:image" content="{{SITE_URL}}/images/hero-patio.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebPage",
    "name": "Menu",
    "url": "{{SITE_URL}}/menu",
    "description": "Full food and drink menu at Twisted Bar & Grill in The Colony, TX.",
    "isPartOf": { "@id": "{{SITE_URL}}/#website" },
    "about": { "@id": "{{SITE_URL}}/#restaurant" }
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      { "@type": "ListItem", "position": 1, "name": "Home", "item": "{{SITE_URL}}/" },
      { "@type": "ListItem", "position": 2, "name": "Menu", "item": "{{SITE_URL}}/menu" }
    ]
  }
  </script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Menu",
    "name": "Twisted Bar & Grill Menu",
    "description": "American bar and grill menu with appetizers, wings, tacos, burgers, and mains.",
    "hasMenuSection": [
      { "@type": "MenuSection", "name": "Appetizers" },
      { "@type": "MenuSection", "name": "Soup & Salad" },
      { "@type": "MenuSection", "name": "Wings" },
      { "@type": "MenuSection", "name": "Main Entrées" },
      { "@type": "MenuSection", "name": "Handhelds" },
      { "@type": "MenuSection", "name": "Cocktails" },
      { "@type": "MenuSection", "name": "Hookah" }
    ]
  }
  </script>
</head>
<body data-page="menu">

  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo" aria-label="Twisted Bar & Grill">
        <img src="/images/logo-header.png" alt="Twisted Bar & Grill" class="logo-img">
      </a>
      <nav aria-label="Main navigation">
      <button class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/menu">Menu</a></li>
        <li><a href="/our-space">Our Space</a></li>
        <li><a href="/events">Events</a></li>
        <li><a href="/contact">Contact Us</a></li>
      </ul>
      </nav>
    </div>
  </header>

  <main id="main-content">

  <section class="page-header">
    <div class="container">
      <p class="section-label">{{CMS_MENU_LABEL}}</p>
      <h1>{{CMS_MENU_TITLE}}</h1>
      <p>{{CMS_MENU_INTRO}}</p>
      <p class="menu-note menu-note--left">{{CMS_MENU_NOTE}}</p>
    </div>
  </section>

  <section style="padding-top: 0;">
    <div class="container">

{{CMS_MENU_BODY}}

    </div>
  </section>

  </main>

{{SITE_FOOTER}}

  <script src="/js/main.js"></script>
</body>
</html>
